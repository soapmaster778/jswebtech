<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №9 - Робота з формами</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="form-container">
    <div class="tabs">
        <button id="btn-reg-tab" class="tab-btn active" type="button">Signup</button>
        <button id="btn-log-tab" class="tab-btn" type="button">Login</button>
    </div>

    <div id="register-tab" class="tab-content active">
        <h2>Create an account</h2>
        <form id="register-form" novalidate>

            <div class="form-group">
                <label for="reg-firstname">First Name *</label>
                <input type="text" id="reg-firstname" placeholder="Enter first name">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="reg-lastname">Last Name *</label>
                <input type="text" id="reg-lastname" placeholder="Enter last name">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="reg-email">Email *</label>
                <input type="email" id="reg-email" placeholder="Enter email">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="reg-password">Password *</label>
                <div class="input-icon-container">
                    <input type="password" id="reg-password" placeholder="Enter password">
                    <i class="fas fa-eye toggle-password" id="toggle-reg-pass"></i>
                </div>
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="reg-confirm">Confirm Password *</label>
                <div class="input-icon-container">
                    <input type="password" id="reg-confirm" placeholder="Confirm password">
                    <i class="fas fa-eye toggle-password" id="toggle-reg-confirm"></i>
                </div>
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="reg-phone">Phone *</label>
                <input type="text" id="reg-phone" placeholder="+380XXXXXXXXX">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="reg-dob">Date of Birth *</label>
                <input type="date" id="reg-dob">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label>Sex *</label>
                <div class="radio-group">
                    <label><input type="radio" name="sex" value="male"> Male</label>
                    <label><input type="radio" name="sex" value="female"> Female</label>
                </div>
                <div class="error-msg" id="sex-error"></div>
            </div>

            <div class="form-group">
                <label for="reg-country">Country *</label>
                <select id="reg-country">
                    <option value="">Choose country...</option>
                    <option value="Ukraine">Ukraine</option>
                    <option value="USA">USA</option>
                </select>
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="reg-city">City *</label>
                <select id="reg-city" disabled>
                    <option value="">Choose city...</option>
                </select>
                <div class="error-msg"></div>
            </div>

            <button type="submit" class="btn-submit">Signup</button>
        </form>
    </div>

    <div id="login-tab" class="tab-content">
        <h2>Login here</h2>
        <form id="login-form" novalidate>

            <div class="form-group">
                <label for="log-username">Username *</label>
                <input type="text" id="log-username" placeholder="Enter username">
                <div class="error-msg"></div>
            </div>

            <div class="form-group">
                <label for="log-password">Password *</label>
                <div class="input-icon-container">
                    <input type="password" id="log-password" placeholder="Enter password">
                    <i class="fas fa-eye toggle-password" id="toggle-log-pass"></i>
                </div>
                <div class="error-msg"></div>
            </div>

            <div class="form-group checkbox-group">
                <label><input type="checkbox" id="log-remember"> Remember Me</label>
            </div>

            <button type="submit" class="btn-submit">Login</button>
        </form>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
